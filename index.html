<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI/ML & Backend Engineering Roadmap</title>
    <style>
        /* Soothing, low-contrast dark theme */
        :root {
            --bg-base: #1e1e2e;
            --bg-surface: #313244;
            --bg-surface-hover: #45475a;
            --text-main: #cdd6f4;
            --text-muted: #a6adc8;
            --accent-lavender: #b4befe;
            --accent-green: #a6e3a1;
            --border-soft: rgba(255, 255, 255, 0.05);
            --shadow-soft: 0 8px 24px rgba(0, 0, 0, 0.15);
            --radius-lg: 16px;
            --radius-md: 10px;
            --radius-sm: 6px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            line-height: 1.7;
            padding: 40px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            color: var(--accent-lavender);
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1em;
        }

        /* Progress Dashboard - Soothing Cards */
        .progress-dashboard {
            background-color: var(--bg-surface);
            padding: 24px 30px;
            border-radius: var(--radius-lg);
            margin-bottom: 30px;
            box-shadow: var(--shadow-soft);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-weight: 500;
            color: var(--text-main);
        }

        .progress-bar-container {
            width: 100%;
            height: 12px;
            background-color: var(--bg-base);
            border-radius: 20px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background-color: var(--accent-green);
            width: 0%;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 20px;
            box-shadow: 0 0 10px rgba(166, 227, 161, 0.4);
        }

        .category-progress {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
            margin-top: 20px;
            font-size: 0.85em;
            color: var(--text-muted);
        }

        .category-progress div {
            background-color: rgba(0,0,0,0.15);
            padding: 8px 12px;
            border-radius: var(--radius-sm);
        }

        /* Controls */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
        }

        button {
            background-color: var(--bg-surface);
            color: var(--text-main);
            border: none;
            padding: 10px 18px;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 500;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        button:hover {
            background-color: var(--bg-surface-hover);
            color: var(--accent-lavender);
            transform: translateY(-1px);
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 12px 20px;
            border-radius: var(--radius-md);
            border: none;
            background-color: var(--bg-surface);
            color: var(--text-main);
            min-width: 250px;
            font-size: 0.95em;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: box-shadow 0.2s ease;
        }

        input[type="text"]::placeholder {
            color: var(--text-muted);
        }

        input[type="text"]:focus {
            outline: none;
            box-shadow: 0 0 0 2px var(--accent-lavender);
        }

        /* Tree Styles */
        .tree-container {
            background-color: transparent;
        }

        .node {
            margin-top: 6px;
        }

        /* Root nodes look like separate soft cards */
        .tree-container > .node {
            background-color: var(--bg-surface);
            border-radius: var(--radius-lg);
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-soft);
        }

        .node-content {
            display: flex;
            align-items: flex-start;
            padding: 8px;
            border-radius: var(--radius-md);
            transition: background-color 0.2s ease;
        }

        .node-content:hover {
            background-color: rgba(255, 255, 255, 0.03);
        }

        .toggle-btn {
            background: none;
            border: none;
            box-shadow: none;
            color: var(--text-muted);
            width: 28px;
            height: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
            padding: 0;
            margin-right: 8px;
            border-radius: 50%;
        }

        .toggle-btn:hover {
            color: var(--accent-lavender);
            background-color: rgba(255, 255, 255, 0.05);
            transform: none;
        }

        /* Soft custom checkbox */
        .checkbox {
            margin-top: 6px;
            margin-right: 14px;
            cursor: pointer;
            width: 18px;
            height: 18px;
            accent-color: var(--accent-green);
            opacity: 0.8;
            transition: opacity 0.2s ease;
        }
        
        .checkbox:hover {
            opacity: 1;
        }

        .node-text {
            flex-grow: 1;
        }

        .node-title {
            font-weight: 500;
            color: var(--text-main);
            transition: color 0.3s ease;
        }

        /* Soothing strikethrough for completed items */
        .node-title.completed {
            text-decoration: line-through;
            color: var(--text-muted);
            opacity: 0.6;
        }

        .node-desc {
            font-size: 0.9em;
            color: var(--text-muted);
            margin-top: 4px;
            line-height: 1.5;
        }

        .node-meta {
            display: inline-block;
            font-size: 0.75em;
            margin-top: 8px;
            padding: 4px 10px;
            background-color: rgba(180, 190, 254, 0.1);
            color: var(--accent-lavender);
            border-radius: 20px;
            letter-spacing: 0.3px;
        }

        .children-container {
            margin-left: 32px;
            border-left: 1px solid var(--border-soft);
            padding-left: 12px;
            display: none;
        }

        .children-container.expanded {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .hidden {
            display: none !important;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .controls {
                flex-direction: column;
            }
            input[type="text"] {
                width: 100%;
            }
            .category-progress {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>AI/ML & Backend Architecture</h1>
        <p>A focused, distraction-free roadmap to mastery</p>
    </header>

    <div class="progress-dashboard">
        <div class="progress-header">
            <span>Overall Journey</span>
            <span id="overall-percentage">0%</span>
        </div>
        <div class="progress-bar-container">
            <div class="progress-bar-fill" id="overall-bar"></div>
        </div>
        <div class="category-progress" id="category-progress-container">
            <!-- Populated via JS -->
        </div>
    </div>

    <div class="controls">
        <input type="text" id="search-input" placeholder="Search concepts, tools, or projects...">
        <button id="btn-expand-all">Expand All</button>
        <button id="btn-collapse-all">Collapse All</button>
        <button id="btn-check-all">Check All</button>
        <button id="btn-uncheck-all">Uncheck All</button>
        <button id="btn-reset">Reset</button>
    </div>

    <div class="tree-container" id="roadmap-tree">
        <!-- Tree rendered via JS -->
    </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
