<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI/ML & Backend Engineering Roadmap</title>
    <style>
        :root {
            /* Soothing Color Palette */
            --bg-color: #f4f5f4;        /* Very soft grey-green off-white */
            --card-bg: #ffffff;         /* Pure white for content clarity */
            --text-main: #4a5568;       /* Soft slate grey, easier on the eyes than pure black */
            --text-muted: #94a3b8;      /* Gentle muted grey */
            --accent: #7fa192;          /* Calming sage green */
            --accent-hover: #658577;    /* Slightly deeper sage for hover states */
            --border: #e2e8f0;          /* Very faint border */
            --success: #88b5a1;         /* Gentle green for progress bars */
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.04); /* Soft, diffused shadow */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.7;
            padding: 40px 20px;
            transition: background-color 0.4s ease;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            color: var(--text-main);
            margin-bottom: 12px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        
        header p {
            color: var(--accent);
            font-size: 1.1em;
        }

        /* Progress Section */
        .progress-dashboard {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 25px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-weight: 500;
            color: var(--text-main);
        }

        .progress-bar-container {
            width: 100%;
            height: 12px;
            background-color: var(--bg-color);
            border-radius: 20px;
            overflow: hidden;
            border: inset 1px rgba(0,0,0,0.02);
        }

        .progress-bar-fill {
            height: 100%;
            background-color: var(--success);
            width: 0%;
            border-radius: 20px;
            transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .category-progress {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
            margin-top: 20px;
            font-size: 0.9em;
            color: var(--text-muted);
        }

        /* Controls */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 25px;
        }

        button {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        button:hover {
            background-color: var(--accent);
            color: white;
            border-color: var(--accent);
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(127, 161, 146, 0.2);
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background-color: var(--card-bg);
            color: var(--text-main);
            min-width: 250px;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.01);
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(127, 161, 146, 0.1);
        }
        
        input[type="text"]::placeholder {
            color: var(--text-muted);
        }

        /* Tree Styles */
        .tree-container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .node {
            margin-top: 8px;
        }

        .node-content {
            display: flex;
            align-items: flex-start;
            padding: 10px 12px;
            border-radius: 8px;
            transition: background-color 0.3s ease;
        }

        .node-content:hover {
            background-color: var(--bg-color);
        }

        .toggle-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            width: 24px;
            height: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9em;
            padding: 0;
            margin-right: 8px;
            margin-top: 2px;
            box-shadow: none;
        }

        .toggle-btn:hover {
            color: var(--accent);
            background: none;
            transform: scale(1.1);
            box-shadow: none;
        }

        .checkbox {
            margin-top: 6px;
            margin-right: 15px;
            cursor: pointer;
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
            transition: all 0.2s;
        }

        .node-text {
            flex-grow: 1;
        }

        .node-title {
            font-weight: 500;
            color: var(--text-main);
            transition: color 0.3s ease;
        }

        .node-title.completed {
            text-decoration: line-through;
            color: var(--text-muted);
            opacity: 0.7;
        }

        .node-desc {
            font-size: 0.9em;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .node-meta {
            font-size: 0.85em;
            margin-top: 6px;
            color: var(--accent);
            background-color: rgba(127, 161, 146, 0.1);
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .children-container {
            margin-left: 30px;
            border-left: 2px solid #f0f2f5;
            padding-left: 15px;
            display: none; 
        }

        .children-container.expanded {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        /* Resources Styles */
        .resources {
            margin-top: 12px;
            margin-bottom: 12px;
            padding: 20px;
            background-color: #fafbfb;
            border-radius: 8px;
            border-left: 4px solid var(--accent);
            font-size: 0.9em;
            display: none;
        }

        .resources.expanded {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        .resources h4 {
            margin-bottom: 12px;
            color: var(--text-main);
            font-weight: 600;
        }

        .resources ul {
            list-style-type: none;
            margin-bottom: 15px;
        }
        
        .resources ul:last-child {
            margin-bottom: 0;
        }

        .resources li {
            margin-bottom: 6px;
            position: relative;
            padding-left: 15px;
        }
        
        .resources li::before {
            content: "•";
            position: absolute;
            left: 0;
            color: var(--accent);
        }

        .resources a {
            color: var(--text-main);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .resources a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
            text-decoration-color: var(--accent-hover);
        }

        .hidden {
            display: none !important;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            body { padding: 20px 15px; }
            .controls { flex-direction: column; }
            input[type="text"] { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>AI/ML & Backend Engineering Roadmap</h1>
        <p>The 1% Engineer Trajectory</p>
    </header>

    <div class="progress-dashboard">
        <div class="progress-header">
            <span>Overall Progress</span>
            <span id="overall-percentage">0% (0 / 0 completed)</span>
        </div>
        <div class="progress-bar-container">
            <div class="progress-bar-fill" id="overall-bar"></div>
        </div>
        <div class="category-progress" id="category-progress-container">
            <!-- Populated via JS -->
        </div>
    </div>

    <div class="controls">
        <input type="text" id="search-input" placeholder="Search topics, skills, projects...">
        <button id="btn-expand-all">Expand All</button>
        <button id="btn-collapse-all">Collapse All</button>
        <button id="btn-check-all">Check All</button>
        <button id="btn-uncheck-all">Uncheck All</button>
        <button id="btn-reset">Reset Progress</button>
    </div>

    <div class="tree-container" id="roadmap-tree">
        <!-- Tree rendered via JS -->
    </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
