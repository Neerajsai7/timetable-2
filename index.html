<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI/ML & Backend Engineering Roadmap</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --accent: #bb86fc;
            --accent-hover: #9965f4;
            --border: #333333;
            --success: #03dac6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--accent);
            margin-bottom: 10px;
        }

        /* Progress Section */
        .progress-dashboard {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .progress-bar-container {
            width: 100%;
            height: 20px;
            background-color: var(--bg-color);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .progress-bar-fill {
            height: 100%;
            background-color: var(--success);
            width: 0%;
            transition: width 0.4s ease;
        }

        .category-progress {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
            font-size: 0.9em;
        }

        /* Controls */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background-color: var(--border);
            color: var(--accent);
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background-color: var(--card-bg);
            color: var(--text-main);
            min-width: 250px;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* Tree Styles */
        .tree-container {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .node {
            margin-top: 8px;
        }

        .node-content {
            display: flex;
            align-items: flex-start;
            padding: 8px;
            border-radius: 6px;
            transition: background-color 0.2s;
        }

        .node-content:hover {
            background-color: #2a2a2a;
        }

        .toggle-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            width: 24px;
            height: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            padding: 0;
            margin-right: 5px;
        }

        .toggle-btn:hover {
            color: var(--accent);
            background: none;
        }

        .checkbox {
            margin-top: 5px;
            margin-right: 12px;
            cursor: pointer;
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
        }

        .node-text {
            flex-grow: 1;
        }

        .node-title {
            font-weight: 600;
            color: var(--text-main);
        }

        .node-title.completed {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .node-desc {
            font-size: 0.85em;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .node-meta {
            font-size: 0.8em;
            margin-top: 4px;
            color: var(--accent);
        }

        .children-container {
            margin-left: 28px;
            border-left: 1px solid var(--border);
            padding-left: 10px;
            display: none; /* Hidden by default */
        }

        .children-container.expanded {
            display: block;
        }

        /* Resources Styles */
        .resources {
            margin-top: 10px;
            padding: 12px;
            background-color: #252525;
            border-radius: 6px;
            border-left: 3px solid var(--accent);
            font-size: 0.85em;
            display: none;
        }

        .resources.expanded {
            display: block;
        }

        .resources h4 {
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .resources ul {
            list-style-type: none;
            margin-bottom: 10px;
        }

        .resources li {
            margin-bottom: 4px;
        }

        .resources a {
            color: var(--success);
            text-decoration: none;
        }

        .resources a:hover {
            text-decoration: underline;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 600px) {
            .controls {
                flex-direction: column;
            }
            input[type="text"] {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>AI/ML & Backend Engineering Roadmap</h1>
        <p>The 1% Engineer Trajectory</p>
    </header>

    <div class="progress-dashboard">
        <div class="progress-header">
            <span>Overall Progress</span>
            <span id="overall-percentage">0% (0 / 0 completed)</span>
        </div>
        <div class="progress-bar-container">
            <div class="progress-bar-fill" id="overall-bar"></div>
        </div>
        <div class="category-progress" id="category-progress-container">
            <!-- Populated via JS -->
        </div>
    </div>

    <div class="controls">
        <input type="text" id="search-input" placeholder="Search topics, skills, projects...">
        <button id="btn-expand-all">Expand All</button>
        <button id="btn-collapse-all">Collapse All</button>
        <button id="btn-check-all">Check All</button>
        <button id="btn-uncheck-all">Uncheck All</button>
        <button id="btn-reset">Reset Progress</button>
    </div>

    <div class="tree-container" id="roadmap-tree">
        <!-- Tree rendered via JS -->
    </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
